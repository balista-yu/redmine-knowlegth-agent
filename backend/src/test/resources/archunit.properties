# =============================================================================
# ArchUnit configuration
# =============================================================================
# T-1-1 時点では domain.* / infrastructure.persistence.entity.* など各種パッケージが
# まだ未実装。ArchUnit 1.4 から `failOnEmptyShould` が default true になっているため、
# まだクラスが存在しない段階のルールが空マッチで FAIL する。
#
# 実装が始まるまでの間は false で運用し、Phase 1 が進んで各 layer に classes が
# 揃った時点でこの設定を削除して default の true に戻す予定。
# =============================================================================
archRule.failOnEmptyShould=false
